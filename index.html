<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <header class="site-header">
      <img src="img/nasa.clear-removebg-preview.png" alt="NA" class="logo" />
      <h1><img src="img/nasa-worm-logo.png" alt="NA" class="logo" /> Space Explorer</h1>
    </header>

    <!-- FILTERS -->
    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="getImagesBtn">Get Space Images</button>
    </div>

    <!-- LOADING / FACT -->
    <div id="spaceFact" class="space-fact"></div>

    <!-- GALLERY -->
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range to explore space!</p>
      </div>
    </div>

  </div>

  <!-- IMPORTANT ORDER -->
  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
